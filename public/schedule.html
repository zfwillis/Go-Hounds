<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <nav class="navbar navbar-expand-sm navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/logo.png" alt="Loyola home" style="height:44px;" class="me-2" />
        <span class="fw-semibold">Go Hounds</span>
        </a>
        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-0 ms-sm-3">
            <li class="nav-item"><a class="nav-link" href="points.html">Points</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="schedule.html">Schedule</a></li>
            <li class="nav-item"><a class="nav-link" href="account.html">Account</a></li>
        </ul>
        </div>
    </div>
    </nav>
<div class="container">
  <div class="hero">
    <h1>Schedule</h1>
    <p>Home events eligible for points.</p>
  </div>

  <div class="table-responsive mt-3">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-success">
        <tr><th>Date</th><th>Sport</th><th>Opponent</th><th>Time</th><th>Action</th></tr>
      </thead>
      <tbody>
        <tr><td>Feb 16</td><td>Men's Basketball</td><td>Boston U</td><td>7:00 PM</td><td><button class="btn btn-evergreen btn-sm">Check In</button></td></tr>
        <tr><td>Feb 18</td><td>Women's Lacrosse</td><td>Navy</td><td>1:00 PM</td><td><button class="btn btn-evergreen btn-sm">Check In</button></td></tr>
        <tr><td>Feb 22</td><td>Men's Soccer</td><td>American</td><td>6:00 PM</td><td><button class="btn btn-evergreen btn-sm">Check In</button></td></tr>
      </tbody>
    </table>
  </div>

  <div class="card mt-4 mb-4">
    <div class="card-header">Game Check-In Form</div>
    <div class="card-body">
      <form action="localhost:4000" id="checkInForm" method="post">
        <div class="row g-3">
          <div class="col-12 col-sm-6">
            <label for="checkinDate">Game Date</label>
            <input type="date" id="checkinDate" name="checkinDate" />
          </div>
          <div class="col-12 col-sm-6">
            <label for="sport">Sport</label>
            <select id="sport" name="sport">
              <option value = "mbball">Men's Basketball</option>
              <option value = "wbball">Women's Basketball</option>
              <option value = "mlac">Men's Lacrosse</option>
              <option value = "wlac">Women's Lacrosse</option>
              <option value = "msoc">Men's Soccer</option>
              <option value = "wsoc">Women's Soccer</option>
            </select>
          </div>
          <div class="col-12 col-sm-6">
            <label for="opponent">Opponent</label>
            <input type="text" id="opponent" name="opponent" placeholder="Opponent name"  />
          </div>
          <div class="col-12 col-sm-6">
            <label for="studentId">Student ID</label>
            <input type="text" id="studentId" name="studentId" placeholder="e.g. 1886501"  />
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-evergreen" onclick = "return submitCheckIn();">Submit Check-In</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="submitCheckIn.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
