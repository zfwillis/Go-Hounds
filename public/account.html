<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <nav class="navbar navbar-expand-sm navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/logo.png" alt="Loyola home" style="height:44px;" class="me-2" />
        <span class="fw-semibold">Go Hounds</span>
        </a>
        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-0 ms-sm-3">
            <li class="nav-item"><a class="nav-link" href="points.html">Points</a></li>
            <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="account.html">Account</a></li>
        </ul>
        </div>
    </div>
    </nav>
<div class="container">
  <div class="hero">
    <h1>Account</h1>
    <p>Sign in to sync your check-ins across devices.</p>
  </div>

  <div class="row g-3 mt-3">
    <div class="col-12 col-md-6">
      <div class="card h-100">
        <div class="card-header">Log In</div>
        <div class="card-body">
          <form>
            <div class="mb-3">
              <label for="email" class="form-label">Loyola Email</label>
              <input type="email" class="form-control" id="email" placeholder="abc@loyola.edu" required />
            </div>
            <div class="mb-3">
              <label for="pwd" class="form-label">Password</label>
              <input type="password" class="form-control" id="pwd" required minlength="6" />
            </div>
            <button type="submit" class="btn btn-evergreen">Log In</button>
          </form>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <div class="card h-100">
        <div class="card-header">Create Account</div>
        <div class="card-body">
          <form>
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" placeholder="Full name" />
            </div>
            <div class="mb-3">
              <label for="classYear" class="form-label">Class Year</label>
              <input type="number" class="form-control" id="classYear" min="2025" max="2030" />
            </div>
            <button type="submit" class="btn btn-evergreen">Create Account</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
